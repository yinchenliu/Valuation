{% extends "base.html" %}

{% block title %}Upload Financial Statements{% endblock %}

{% block content %}
<div class="card">
    <h1>Upload 10-K Filing</h1>
    <p>Upload a 10-K or 10-Q PDF filing. Financial data will be extracted automatically via LLM.</p>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="ticker">Ticker Symbol</label>
            <input type="text" id="ticker" name="ticker" placeholder="e.g., AAPL" required>
        </div>

        <div class="form-group">
            <label for="company_name">Company Name (optional)</label>
            <input type="text" id="company_name" name="company_name" placeholder="e.g., Apple Inc.">
        </div>

        <div class="form-group">
            <label for="pdf_file">10-K / 10-Q PDF Filing</label>
            <input type="file" id="pdf_file" name="pdf_file" accept=".pdf" required>
        </div>

        <button type="submit" class="btn btn-primary">Upload & Continue</button>
    </form>
</div>
{% endblock %}
